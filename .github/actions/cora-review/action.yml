name: 'Cora AI Code Review'
description: 'Run cora AI code review on a PR diff. Posts PR comment with findings.'

inputs:
  base-branch:
    description: 'Base branch to compare against (default: origin/develop)'
    required: false
    default: 'origin/develop'
  severity:
    description: 'Minimum severity to report (info, minor, major, critical)'
    required: false
    default: 'major'
  cora-version:
    description: 'cora-cli version tag (default: latest release)'
    required: false
    default: 'latest'
  upload-sarif:
    description: 'Upload SARIF to GitHub Code Scanning (default: true). Set to "false" to disable.'
    required: false
    default: 'true'
  cora-api-key:
    description: 'LLM API key'
    required: true
  cora-base-url:
    description: 'LLM API base URL'
    required: false
  cora-model:
    description: 'LLM model ID'
    required: false
  github-token:
    description: 'GitHub token for PR comments and SARIF upload'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Resolve cora-cli version
      id: resolve
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.cora-version }}
      run: |
        if [ "$INPUT_VERSION" = "latest" ]; then
          for i in 1 2 3; do
            VERSION=$(curl -sfL --connect-timeout 10 \
              https://api.github.com/repos/codecoradev/cora-cli/releases/latest \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('tag_name', ''))" 2>/dev/null)
            if [ -n "$VERSION" ]; then
              break
            fi
            echo "Attempt $i failed, retrying..."
            sleep 5
          done
          if [ -z "$VERSION" ]; then
            echo "::warning::Failed to resolve latest cora-cli version from GitHub API, using fallback"
            VERSION="v0.3.0"
          fi
        else
          VERSION="$INPUT_VERSION"
        fi
        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Resolved cora-cli version: $VERSION"

    - name: Install cora-cli
      shell: bash
      env:
        CORA_VERSION: ${{ steps.resolve.outputs.VERSION }}
      run: |
        ARCH=$(uname -m)
        if [ "$ARCH" = "x86_64" ]; then
          ASSET="cora-x86_64-unknown-linux-gnu"
        elif [ "$ARCH" = "aarch64" ]; then
          ASSET="cora-aarch64-unknown-linux-gnu"
        else
          echo "Unsupported architecture: $ARCH"
          exit 1
        fi

        DOWNLOAD_URL="https://github.com/codecoradev/cora-cli/releases/download/${CORA_VERSION}/${ASSET}-${CORA_VERSION}.tar.gz"
        CHECKSUM_URL="https://github.com/codecoradev/cora-cli/releases/download/${CORA_VERSION}/checksums-sha256.txt"

        # Download tarball with retry + exponential backoff
        # Handles: CDN propagation delay on fresh releases, transient network errors, rate limits
        for i in 1 2 3 4 5; do
          rm -f /tmp/cora.tar.gz
          HTTP_CODE=$(curl --fail --show-error -sL --connect-timeout 15 --max-time 120 \
            -w '%{http_code}' -o /tmp/cora.tar.gz "$DOWNLOAD_URL" || echo "000")
          FILE_SIZE=$(wc -c < /tmp/cora.tar.gz 2>/dev/null || echo 0)
          echo "Download attempt $i: HTTP $HTTP_CODE, size ${FILE_SIZE} bytes"
          if [ "$HTTP_CODE" = "200" ] && [ "$FILE_SIZE" -gt 1000 ]; then
            break
          fi
          if [ "$i" -eq 5 ]; then
            echo "::error::Failed to download ${ASSET}-${CORA_VERSION}.tar.gz after 5 attempts (last HTTP $HTTP_CODE, ${FILE_SIZE} bytes)"
            exit 1
          fi
          BACKOFF=$((i * 10))
          echo "Attempt $i failed (HTTP $HTTP_CODE), retrying in ${BACKOFF}s..."
          sleep "$BACKOFF"
        done

        # Validate downloaded file is actual gzip
        FILE_TYPE=$(file -b /tmp/cora.tar.gz 2>/dev/null || echo "unknown")
        if ! echo "$FILE_TYPE" | grep -qi "gzip"; then
          echo "::error::Downloaded file is not gzip. Got: $FILE_TYPE (HTTP $HTTP_CODE, ${FILE_SIZE} bytes)"
          exit 1
        fi

        # Download and verify checksums
        CHECKSUM_HTTP=$(curl --fail --show-error -sL --connect-timeout 15 --max-time 30 \
          -w '%{http_code}' -o /tmp/cora-checksums.txt "$CHECKSUM_URL" || echo "000")
        if [ -f /tmp/cora-checksums.txt ] && [ -s /tmp/cora-checksums.txt ]; then
          EXPECTED=$(awk -v name="${ASSET}-${CORA_VERSION}.tar.gz" '$2 == name {print $1}' /tmp/cora-checksums.txt)
          ACTUAL=$(sha256sum /tmp/cora.tar.gz | awk '{print $1}')
          if [ -z "$EXPECTED" ]; then
            echo "::error::No checksum entry for ${ASSET}-${CORA_VERSION}.tar.gz — possible release asset mismatch"
            echo "Checksum file contents:"
            cat /tmp/cora-checksums.txt
            rm -f /tmp/cora-checksums.txt
            exit 1
          fi
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Checksum verification failed for ${ASSET}-${CORA_VERSION}.tar.gz"
            echo "Expected: $EXPECTED"
            echo "Actual:   $ACTUAL"
            rm -f /tmp/cora-checksums.txt
            exit 1
          fi
          echo "Checksum verified OK"
          rm -f /tmp/cora-checksums.txt
        else
          echo "::error::Failed to download checksums file (HTTP $CHECKSUM_HTTP) — cannot verify binary integrity"
          rm -f /tmp/cora-checksums.txt
          exit 1
        fi

        tar xzf /tmp/cora.tar.gz -C /usr/local/bin cora
        rm -f /tmp/cora.tar.gz
        chmod +x /usr/local/bin/cora
        cora --version

    - name: Run cora review
      id: review
      shell: bash
      env:
        CORA_API_KEY: ${{ inputs.cora-api-key }}
        CORA_BASE_URL: ${{ inputs.cora-base-url }}
        CORA_MODEL: ${{ inputs.cora-model }}
        INPUT_BASE: ${{ inputs.base-branch }}
        INPUT_SEVERITY: ${{ inputs.severity }}
      run: |
        # Build the cora review command with retry logic and 600s timeout
        run_cora() {
          if [ ! -f .cora.yaml ]; then
            # Create CI config with 5MB diff limit and 600s timeout
            printf 'hook:\n  max_diff_size: 5242880\nllm:\n  timeout: 600\n' > .cora-ci.yaml
            CORA_CONFIG=".cora-ci.yaml" cora review \
              --base "$INPUT_BASE" \
              --format sarif \
              --severity "$INPUT_SEVERITY" \
              --quiet \
              > cora-results.sarif 2>cora-stderr.log
          else
            echo "Using project .cora.yaml for configuration"
            cora review \
              --base "$INPUT_BASE" \
              --format sarif \
              --severity "$INPUT_SEVERITY" \
              --quiet \
              > cora-results.sarif 2>cora-stderr.log
          fi
          return $?
        }

        # Retry up to 3 times with exponential backoff (10s, 30s, 60s)
        EXIT_CODE=1
        for ATTEMPT in 1 2 3; do
          run_cora
          EXIT_CODE=$?
          SARIF_BYTES=$(wc -c < cora-results.sarif 2>/dev/null || echo "0")

          echo "Attempt $ATTEMPT: exit=$EXIT_CODE, sarif_bytes=$SARIF_BYTES"

          # Success: cora exited 0 or produced valid SARIF output
          if [ "$EXIT_CODE" -eq 0 ] || [ "$SARIF_BYTES" -gt 10 ]; then
            break
          fi

          # On failure, show stderr and retry
          if [ -s cora-stderr.log ]; then
            echo "::warning::Attempt $ATTEMPT failed. Cora stderr: $(cat cora-stderr.log)"
          fi

          if [ "$ATTEMPT" -lt 3 ]; then
            SLEEP=$((ATTEMPT * 20))
            echo "Retrying in ${SLEEP}s..."
            sleep "$SLEEP"
            rm -f cora-results.sarif cora-stderr.log
          fi
        done

        echo "Cora review complete ($SARIF_BYTES bytes, exit=$EXIT_CODE, attempts=$ATTEMPT)"
        if [ -s cora-stderr.log ]; then
          echo "::warning::Cora stderr: $(cat cora-stderr.log)"
        fi

        # All retries exhausted and still no valid output — generate a fallback SARIF
        # so the workflow doesn't hard-fail on transient API issues.
        if [ "$EXIT_CODE" -ne 0 ] && [ "$SARIF_BYTES" -lt 10 ]; then
          echo "::warning::Cora review could not complete after $ATTEMPT attempt(s). Generating fallback SARIF."
          cat > cora-results.sarif << 'SARIF_EOF'
        {
          "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
          "version": "2.1.0",
          "runs": [{
            "tool": {
              "driver": {
                "name": "cora",
                "informationUri": "https://github.com/codecoradev/cora-cli",
                "version": "0.4.0"
              }
            },
            "results": [{
              "level": "warning",
              "message": {
                "text": "Cora AI review could not complete — LLM API was unavailable after 3 retry attempts. Review was skipped; no code quality issues were found by the automated check."
              }
            }]
          }]
        }
        SARIF_EOF
        fi

    - name: Check SARIF for findings
      id: sarif-check
      if: inputs.upload-sarif == 'true'
      shell: bash
      run: |
        RESULTS=$(python3 -c "
        import json, sys
        try:
            data = json.load(open('cora-results.sarif'))
            results = data.get('runs', [{}])[0].get('results', [])
            print(len(results))
        except:
            print(0)
        " 2>/dev/null || echo "0")
        echo "results=$RESULTS" >> "$GITHUB_OUTPUT"
        if [ "$RESULTS" -gt 0 ]; then
          echo "SARIF contains $RESULTS finding(s) — will upload."
        else
          echo "SARIF has no findings — skipping upload."
        fi

    - name: Upload SARIF to GitHub Code Scanning
      if: inputs.upload-sarif == 'true' && steps.sarif-check.outputs.results > 0
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
      with:
        sarif_file: cora-results.sarif
        category: cora-review

    - name: Post PR comment
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9.0.0
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      with:
        script: |
          const fs = require('fs');

          let sarifContent;
          try {
            sarifContent = JSON.parse(fs.readFileSync('cora-results.sarif', 'utf8'));
          } catch (e) {
            sarifContent = null;
          }

          let body;
          if (!sarifContent || !sarifContent.runs || sarifContent.runs.length === 0) {
            let fileSize = 0;
            try {
              fileSize = fs.statSync('cora-results.sarif').size;
            } catch (e) {
              fileSize = 0;
            }
            if (fileSize < 10) {
              body = `## 🔍 Cora AI Code Review\n\n⚠️ **Review could not complete.** Cora produced an empty result. Check the workflow logs for errors.\n\n---\n_Review powered by [cora-cli](https://github.com/codecoradev/cora-cli) · BYOK · MIT_`;
            } else {
              body = `## 🔍 Cora AI Code Review\n\n✅ **No issues found.** Code looks good!\n\n---\n_Review powered by [cora-cli](https://github.com/codecoradev/cora-cli) · BYOK · MIT_`;
            }
          } else {
            const results = sarifContent.runs[0].results || [];
            if (results.length === 0) {
              body = `## 🔍 Cora AI Code Review\n\n✅ **No issues found.** Code looks good!\n\n---\n_Review powered by [cora-cli](https://github.com/codecoradev/cora-cli) · BYOK · MIT_`;
            } else {
              const grouped = {};
              for (const r of results) {
                const sev = (r.level || 'note').charAt(0).toUpperCase() + (r.level || 'note').slice(1);
                if (!grouped[sev]) grouped[sev] = [];
                grouped[sev].push(r);
              }

              const severityOrder = ['Error', 'Warning', 'Note'];
              let table = '';

              for (const sev of severityOrder) {
                if (!grouped[sev]) continue;
                const icon = sev === 'Error' ? '🔴' : sev === 'Warning' ? '🟡' : '🔵';
                table += `\n### ${icon} ${sev} (${grouped[sev].length})\n\n`;
                for (const r of grouped[sev]) {
                  const loc = r.locations?.[0]?.physicalLocation;
                  const file = loc?.artifactLocation?.uri || 'unknown';
                  const line = loc?.region?.startLine || '?';
                  const msg = r.message?.text || r.message?.markdown || 'No message';
                  table += `- \`${file}:${line}\` — ${msg}\n`;
                }
              }

              const hasErrors = (grouped['Error'] || []).length > 0;
              const hasWarnings = (grouped['Warning'] || []).length > 0;
              const status = hasErrors ? '❌ **Blocked** — critical issues found.' :
                            hasWarnings ? '⚠️ **Review recommended** — warnings found.' :
                            '✅ **Passed** — only informational notes.';

              body = `## 🔍 Cora AI Code Review\n\n${status}\n${table}\n---\n_Review powered by [cora-cli](https://github.com/codecoradev/cora-cli) · BYOK · MIT_`;
            }
          }

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c =>
            c.user.login === 'github-actions[bot]' &&
            c.body.startsWith('## 🔍 Cora AI Code Review')
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Check for blocking issues
      if: always()
      shell: bash
      run: |
        if [ -f cora-results.sarif ]; then
          ERRORS=$(python3 -c "
          import json, sys
          try:
            data = json.load(open('cora-results.sarif'))
            results = data.get('runs', [{}])[0].get('results', [])
            errors = [r for r in results if r.get('level') == 'error']
            print(len(errors))
          except:
            print(0)
          " 2>/dev/null || echo "0")

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Cora found $ERRORS blocking issue(s)."
            exit 1
          fi
        fi
        echo "No blocking issues."
